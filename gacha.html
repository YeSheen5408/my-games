<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>賽博冒險者 - 抽卡模擬器 💎</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', Microsoft JhengHei, sans-serif;
            background: #121214;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 { color: #00ffcc; font-size: 24px; margin-bottom: 5px; text-shadow: 0 0 10px rgba(0,255,204,0.5); }
        .stats { font-size: 14px; color: #aaa; margin-bottom: 15px; }
        
        /* 機率與圖鑑剩餘數量公告欄 */
        .info-panel {
            width: 100%;
            max-width: 400px;
            background: #1a1a1f;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 15px;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .color-ssr { color: #ffcc00; font-weight: bold; }
        .color-sr { color: #da70d6; font-weight: bold; }
        .color-r { color: #888; font-weight: bold; }

        /* 轉蛋機舞台 */
        .gacha-stage {
            width: 100%;
            max-width: 400px;
            height: 220px;
            background: linear-gradient(180deg, #1f1f26 0%, #2d2d38 100%);
            border: 2px solid #00ffcc;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,255,204,0.2);
        }
        
        /* 抽卡動畫覆蓋層 */
        .effect-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s;
            z-index: 10;
        }
        .effect-layer.flash-ssr { animation: flashSSR 0.8s ease-out; }
        @keyframes flashSSR {
            0% { opacity: 0; background: #ff00ff; }
            20% { opacity: 1; background: #ffcc00; }
            100% { opacity: 0; }
        }

        /* 顯示抽卡結果區域 */
        .result-display {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px;
            width: 100%;
            max-height: 100%;
            overflow-y: auto;
        }

        /* 按鈕區 */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            width: 100%;
            max-width: 400px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-single { background: #0077ff; color: white; border: 1px solid #0055cc; }
        .btn-multi { background: #ff0077; color: white; border: 1px solid #cc0055; box-shadow: 0 0 10px rgba(255,0,119,0.4); }

        /* 角色卡片樣式 */
        .card {
            width: 70px;
            padding: 8px 4px;
            border-radius: 6px;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            animation: popIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) both;
        }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        
        .card .avatar { font-size: 24px; }
        .card .badge {
            font-size: 9px;
            padding: 1px 4px;
            border-radius: 3px;
            color: #fff;
        }
        
        .ssr { background: linear-gradient(135deg, #ffe600 0%, #ff0055 100%); color: #fff; box-shadow: 0 0 8px #ffcc00; border: 1px solid #fff;}
        .ssr .badge { background: #000; color: #ffcc00; }
        .sr { background: #8a2be2; color: #fff; border: 1px solid #da70d6; }
        .sr .badge { background: #da70d6; }
        .r { background: #333; color: #ccc; border: 1px solid #555; }
        .r .badge { background: #666; }

        /* 倉庫區域 */
        .inventory-section {
            width: 100%;
            max-width: 400px;
            margin-top: 25px;
            flex: 1;
        }
        .inventory-title {
            font-size: 16px;
            color: #00ffcc;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 10px;
            max-height: 250px;
            overflow-y: auto;
            padding-bottom: 20px;
        }
        .inv-item {
            background: #1e1e24;
            border-radius: 6px;
            padding: 8px;
            text-align: center;
            font-size: 12px;
            position: relative;
        }
        .inv-item .count {
            position: absolute;
            top: 2px; right: 4px;
            font-size: 10px;
            background: rgba(0,0,0,0.6);
            padding: 1px 3px;
            border-radius: 3px;
            color: #00ffcc;
        }
    </style>
</head>
