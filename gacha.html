<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>賽博冒險者 - 抽卡模擬器 💎</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', Microsoft JhengHei, sans-serif;
            background: #121214;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 { color: #00ffcc; font-size: 24px; margin-bottom: 5px; text-shadow: 0 0 10px rgba(0,255,204,0.5); }
        .stats { font-size: 14px; color: #aaa; margin-bottom: 15px; }
        
        /* 機率與圖鑑剩餘數量公告欄 */
        .info-panel {
            width: 100%;
            max-width: 400px;
            background: #1a1a1f;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 15px;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .color-ssr { color: #ffcc00; font-weight: bold; }
        .color-sr { color: #da70d6; font-weight: bold; }
        .color-r { color: #888; font-weight: bold; }

        /* 轉蛋機舞台 */
        .gacha-stage {
            width: 100%;
            max-width: 400px;
            height: 220px;
            background: linear-gradient(180deg, #1f1f26 0%, #2d2d38 100%);
            border: 2px solid #00ffcc;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,255,204,0.2);
        }
        
        /* 抽卡動畫覆蓋層 */
        .effect-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s;
            z-index: 10;
        }
        .effect-layer.flash-ssr { animation: flashSSR 0.8s ease-out; }
        @keyframes flashSSR {
            0% { opacity: 0; background: #ff00ff; }
            20% { opacity: 1; background: #ffcc00; }
            100% { opacity: 0; }
        }

        /* 顯示抽卡結果區域 */
        .result-display {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px;
            width: 100%;
            max-height: 100%;
            overflow-y: auto;
        }

        /* 按鈕區 */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            width: 100%;
            max-width: 400px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-single { background: #0077ff; color: white; border: 1px solid #0055cc; }
        .btn-multi { background: #ff0077; color: white; border: 1px solid #cc0055; box-shadow: 0 0 10px rgba(255,0,119,0.4); }

        /* 角色卡片樣式 */
        .card {
            width: 70px;
            padding: 8px 4px;
            border-radius: 6px;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            animation: popIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) both;
        }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        
        .card .avatar { font-size: 24px; }
        .card .badge {
            font-size: 9px;
            padding: 1px 4px;
            border-radius: 3px;
            color: #fff;
        }
        
        .ssr { background: linear-gradient(135deg, #ffe600 0%, #ff0055 100%); color: #fff; box-shadow: 0 0 8px #ffcc00; border: 1px solid #fff;}
        .ssr .badge { background: #000; color: #ffcc00; }
        .sr { background: #8a2be2; color: #fff; border: 1px solid #da70d6; }
        .sr .badge { background: #da70d6; }
        .r { background: #333; color: #ccc; border: 1px solid #555; }
        .r .badge { background: #666; }

        /* 倉庫區域 */
        .inventory-section {
            width: 100%;
            max-width: 400px;
            margin-top: 25px;
            flex: 1;
        }
        .inventory-title {
            font-size: 16px;
            color: #00ffcc;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 10px;
            max-height: 250px;
            overflow-y: auto;
            padding-bottom: 20px;
        }
        .inv-item {
            background: #1e1e24;
            border-radius: 6px;
            padding: 8px;
            text-align: center;
            font-size: 12px;
            position: relative;
        }
        .inv-item .count {
            position: absolute;
            top: 2px; right: 4px;
            font-size: 10px;
            background: rgba(0,0,0,0.6);
            padding: 1px 3px;
            border-radius: 3px;
            color: #00ffcc;
        }
    </style>
</head>
<body>

    <h1>賽博冒險者召喚 💎</h1>
    <div class="stats">總召喚次數：<span id="total-count">0</span> | 已收集：<span id="unique-count">0</span>/9</div>

    <div class="info-panel">
        <div class="info-row">
            <span class="color-ssr">★ SSR (機率 1.0%)</span>
            <span id="ssr-remain">還差 3 個未收集</span>
        </div>
        <div class="info-row">
            <span class="color-sr">★ SR (機率 10.0%)</span>
            <span id="sr-remain">還差 3 個未收集</span>
        </div>
        <div class="info-row">
            <span class="color-r">★ R (機率 89.0%)</span>
            <span id="r-remain">還差 3 個未收集</span>
        </div>
    </div>

    <div class="gacha-stage">
        <div class="effect-layer" id="effect"></div>
        <div class="result-display" id="result-box">
            <p id="placeholder-text" style="color: #666; font-size: 14px;">點擊下方按鈕開始召喚</p>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn btn-single" onclick="draw(1)">單抽 💎150</button>
        <button class="btn btn-multi" onclick="draw(10)">十連抽 🔥1500</button>
    </div>

    <div class="inventory-section">
        <div class="inventory-title">
            <span>冒險者倉庫</span>
            <span style="font-size:12px; color:#aaa; cursor:pointer;" onclick="clearInventory()">重置數據</span>
        </div>
        <div class="inventory-grid" id="inventory-box"></div>
    </div>

    <script>
        // 角色資料庫
        const pool = {
            SSR: [
                { name: "𝝠𝝾𝝵 核心", icon: "🤖" },
                { name: "霓虹刺客", icon: "🥷" },
                { name: "時空魔導", icon: "🧙‍♀️" }
            ],
            SR: [
                { name: "重裝戰警", icon: "👮‍♂️" },
                { name: "駭客少女", icon: "👩‍💻" },
                { name: "異能槍手", icon: "🤠" }
            ],
            R: [
                { name: "街頭混混", icon: "🧑‍🎤" },
                { name: "無人機", icon: "🛸" },
                { name: "仿生工兵", icon: "👷‍♂️" }
            ]
        };

        let inventory = JSON.parse(localStorage.getItem('gacha_inv')) || {};
        let totalDraws = parseInt(localStorage.getItem('gacha_total')) || 0;

        function updateUI() {
            document.getElementById('total-count').innerText = totalDraws;
            
            const invBox = document.getElementById('inventory-box');
            invBox.innerHTML = '';
            
            let unique = 0;
            let collectedCounts = { SSR: 0, SR: 0, R: 0 };

            // 1. 遍歷渲染倉庫並計算已收集數量
            ['SSR', 'SR', 'R'].forEach(rarity => {
                pool[rarity].forEach(char => {
                    if (inventory[char.name]) {
                        unique++;
                        collectedCounts[rarity]++;
                        
                        const item = document.createElement('div');
                        item.classList.add('inv-item');
                        if(rarity === 'SSR') item.style.border = '1px solid #ffcc00';
                        if(rarity === 'SR') item.style.border = '1px solid #da70d6';
                        
                        item.innerHTML = `
                            <div style="font-size:20px">${char.icon}</div>
                            <div style="font-size:10px; color:#aaa; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${char.name}</div>
                            <div class="count">x${inventory[char.name]}</div>
                        `;
                        invBox.appendChild(item);
                    }
                });
            });
            
            document.getElementById('unique-count').innerText = unique;

            // 2. 計算剩餘未收集數量（這裡修正了大小寫 ID 尋找錯誤）
            const ssrLeft = pool.SSR.length - collectedCounts.SSR;
            const srLeft = pool.SR.length - collectedCounts.SR;
            const rLeft = pool.R.length - collectedCounts.R;

            document.getElementById('ssr-remain').innerText = ssrLeft === 0 ? "🎉 已完全收集！" : `還差 ${ssrLeft} 個未收集`;
            document.getElementById('sr-remain').innerText = srLeft === 0 ? "🎉 已完全收集！" : `還差 ${srLeft} 個未收集`;
            document.getElementById('r-remain').innerText = rLeft === 0 ? "🎉 已完全收集！" : `還差 ${rLeft} 個未收集`;
        }

        function draw(times) {
            const resultBox = document.getElementById('result-box');
            const effect = document.getElementById('effect');
            resultBox.innerHTML = '';
            
            let currentResults = [];
            let hasSSR = false;

            for (let i = 0; i < times; i++) {
                let rarity = 'R';
                let rand = Math.random() * 100;

                if (times === 10 && i === 9) {
                    let guaranteeRand = Math.random() * 11;
                    if (guaranteeRand <= 1) rarity = 'SSR';
                    else rarity = 'SR';
                } else {
                    if (rand <= 1) rarity = 'SSR';
                    else if (rand <= 11) rarity = 'SR';
                    else rarity = 'R';
                }

                if (rarity === 'SSR') hasSSR = true;

                const characters = pool[rarity];
                const picked = characters[Math.floor(Math.random() * characters.length)];
                
                currentResults.push({ ...picked, rarity: rarity });
                inventory[picked.name] = (inventory[picked.name] || 0) + 1;
                totalDraws++;
            }

            localStorage.setItem('gacha_inv', JSON.stringify(inventory));
            localStorage.setItem('gacha_total', totalDraws);

            // 閃爍特效
            if (hasSSR) {
                effect.classList.add('flash-ssr');
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                setTimeout(() => effect.classList.remove('flash-ssr'), 800);
            } else {
                effect.style.opacity = '1';
                setTimeout(() => effect.style.opacity = '0', 150);
            }

            // 渲染卡片
            currentResults.forEach((char, index) => {
                setTimeout(() => {
                    const cardDiv = document.createElement('div');
                    cardDiv.classList.add('card', char.rarity.toLowerCase());
                    cardDiv.innerHTML = `
                        <span class="badge">${char.rarity}</span>
                        <span class="avatar">${char.icon}</span>
                        <span style="font-size:10px; scale:0.9;">${char.name}</span>
                    `;
                    resultBox.appendChild(cardDiv);
                }, index * (times === 10 ? 80 : 0));
            });

            setTimeout(updateUI, times * 80);
        }

        function clearInventory() {
            if(confirm("確定要重置所有抽卡數據嗎？")) {
                inventory = {};
                totalDraws = 0;
                localStorage.clear();
                document.getElementById('result-box').innerHTML = '<p id="placeholder-text" style="color: #666; font-size: 14px;">數據已重置</p>';
                updateUI();
            }
        }

        updateUI();
    </script>
</body>
</html>
