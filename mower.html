<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>爽快解壓：霓虹粒子割草 🔮</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0; background: #05050a; color: #fff;
            font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden;
        }
        .hud {
            width: 100%; max-width: 360px; background: rgba(255,255,255,0.05); padding: 8px 12px; font-size: 12px; font-family: monospace;
        }
        .xp-bar-bg { width: 100%; height: 6px; background: #222; border-radius: 3px; margin-top: 4px; overflow: hidden; }
        .xp-bar-fill { width: 0%; height: 100%; background: #00ffcc; transition: width 0.1s; }
        canvas { background: #0a0a12; border: 2px solid #333; display: block; }
        /* 升級天賦三選一懸浮窗 */
        .upgrade-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 100; flex-direction: column; align-items: center; justify-content: center; gap: 15px;
        }
        .upgrade-card {
            background: #161925; border: 2px solid #ffe600; border-radius: 10px; padding: 15px; width: 260px; text-align: center; cursor: pointer; font-weight: bold; transition: background 0.2s;
        }
        .upgrade-card:hover { background: #222738; }
        .btn-lobby { width: 90%; max-width: 360px; padding: 10px; background: #222; color: #fff; border: none; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="hud">
        <div style="display: flex; justify-content: space-between;">
            <div>等級: <span id="lvl-text" style="color:#00ffcc">1</span></div>
            <div>擊殺: <span id="kill-text">0</span></div>
        </div>
        <div class="xp-bar-bg"><div class="xp-bar-fill" id="xp-fill"></div></div>
    </div>

    <canvas id="mowerCanvas" width="360" height="460"></canvas>

    <div class="upgrade-overlay" id="upgradePanel">
        <h2 style="color:#ffe600; margin-bottom:10px;">✨ 天賦破境突圍 ✨</h2>
        <div class="upgrade-card" onclick="applyUpgrade('laser')">🔮 環狀雷射束數量 +1</div>
        <div class="upgrade-card" onclick="applyUpgrade('range')">🧲 磁力核心吸取半徑 +30%</div>
        <div class="upgrade-card" onclick="applyUpgrade('speed')">⚡ 核心雷射充能速度 +20%</div>
    </div>

    <button class="btn-lobby" onclick="if(window.parent && window.parent.closeGame){window.parent.closeGame()}else{location.href='index.html'}">🚪 收工回大廳</button>

    <script>
        const canvas = document.getElementById('mowerCanvas');
        const ctx = canvas.getContext('2d');

        let player = { x: 180, y: 230, r: 12, xp: 0, nextXp: 10, lvl: 1, kills: 0, laserCount: 1, magnet: 50, cd: 40, cdTimer: 0 };
        let enemies = []; let crystals = []; let lasers = [];
        let isPaused = false; let spawnTimer = 0;

        // 手機與滑鼠拖曳核心移動
        function moveCore(e) {
            if (isPaused) return;
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            player.x = (clientX - rect.left) * (canvas.width / rect.width);
            player.y = (clientY - rect.top) * (canvas.height / rect.height);
        }
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); moveCore(e); }, { passive: false });
        canvas.addEventListener('mousemove', moveCore);

        function applyUpgrade(type) {
            if (type === 'laser') player.laserCount++;
            if (type === 'range') player.magnet *= 1.3;
            if (type === 'speed') player.cd = Math.max(15, player.cd * 0.8);
            
            document.getElementById('upgradePanel').style.display = 'none';
            isPaused = false; gameLoop();
        }

        function gameLoop() {
            if (isPaused) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 生成負電子怪物
            spawnTimer++;
            if (spawnTimer > Math.max(10, 30 - player.lvl)) {
                let angle = Math.random() * Math.PI * 2;
                enemies.push({ x: player.x + Math.cos(angle)*250, y: player.y + Math.sin(angle)*250, r: 6, speed: 1.2 + (player.lvl * 0.1) });
                spawnTimer = 0;
            }

            // 2. 自動發射全方位星芒雷射
            player.cdTimer++;
            if (player.cdTimer >= player.cd) {
                for(let i=0; i<player.laserCount; i++) {
                    let baseAngle = (Math.PI * 2 / player.laserCount) * i + (Date.now()/1000);
                    lasers.push({ x: player.x, y: player.y, vx: Math.cos(baseAngle)*5, vy: Math.sin(baseAngle)*5, life: 30 });
                }
                player.cdTimer = 0;
            }

            // 3. 雷射渲染與怪獸碰撞檢查
            ctx.strokeStyle = '#ffe600'; ctx.lineWidth = 3;
            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i]; l.x += l.vx; l.y += l.vy; l.life--;
                ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(l.x + l.vx*2, l.y + l.vy*2); ctx.stroke();

                for (let j = enemies.length - 1; j >= 0; j--) {
                    let e = enemies[j];
                    if (Math.hypot(e.x - l.x, e.y - l.y) < e.r + 4) {
                        crystals.push({ x: e.x, y: e.y }); // 掉落經驗水晶
                        enemies.splice(j, 1); player.kills++;
                        document.getElementById('kill-text').innerText = player.kills;
                    }
                }
                if (l.life <= 0) lasers.splice(i, 1);
            }

            // 4. 怪物追蹤移動與渲染
            ctx.fillStyle = '#ff0055';
            for (let e of enemies) {
                let angle = Math.atan2(player.y - e.y, player.x - e.x);
                e.x += Math.cos(angle)*e.speed; e.y += Math.sin(angle)*e.speed;
                ctx.fillRect(e.x - e.r, e.y - e.r, e.r*2, e.r*2); // 割草怪用小霓虹方塊
            }

            // 5. 經驗水晶磁力吸取機制
            for (let i = crystals.length - 1; i >= 0; i--) {
                let c = crystals[i]; let dist = Math.hypot(player.x - c.x, player.y - c.y);
                if (dist < player.magnet) { // 進入磁力圈，瘋狂吸過來
                    let angle = Math.atan2(player.y - c.y, player.x - c.x);
                    c.x += Math.cos(angle) * 6; c.y += Math.sin(angle) * 6;
                }
                ctx.fillStyle = '#00ffcc'; ctx.beginPath(); ctx.arc(c.x, c.y, 3, 0, Math.PI*2); ctx.fill();

                if (dist < player.r + 3) { // 吃到經驗
                    crystals.splice(i, 1); player.xp++;
                    if (player.xp >= player.nextXp) { // 升級！
                        player.lvl++; player.xp = 0; player.nextXp = Math.floor(player.nextXp * 1.4);
                        document.getElementById('lvl-text').innerText = player.lvl;
                        isPaused = true;
                        document.getElementById('upgradePanel').style.display = 'flex';
                    }
                    document.getElementById('xp-fill').style.width = (player.xp / player.nextXp)*100 + '%';
                }
            }

            // 6. 繪製吸力核心玩家
            ctx.fillStyle = '#00ffcc'; ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = 'rgba(0,255,204,0.1)'; ctx.lineWidth = player.magnet; ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.stroke();

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
