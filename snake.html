<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>經典貪食蛇遊戲 🐍</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: Arial, sans-serif;
            background: #222;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 { margin: 0 0 5px 0; font-size: 20px; color: #4CAF50; }
        
        /* 頂部控制列（分數與重新開始並排） */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            max-width: 400px;
            margin-bottom: 10px;
        }
        #score { font-size: 16px; }
        .game-over-btn {
            padding: 6px 14px;
            font-size: 14px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        canvas {
            background: #111;
            border: 2px solid #4CAF50;
            width: 90%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
        }
        
        .pc-hint { margin-top: 10px; font-size: 12px; color: #888; }

        /* 手機虛擬手把（放在最底下，有充裕空間） */
        .controller {
            display: grid;
            grid-template-columns: repeat(3, 55px);
            grid-template-rows: repeat(3, 55px);
            grid-gap: 8px;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        
        @media (min-width: 768px) {
            .controller { display: none; }
            .pc-hint { display: block; }
        }
        @media (max-width: 767px) {
            .pc-hint { display: none; }
        }

        .ctrl-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(76, 175, 80, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #4CAF50;
            user-select: none;
        }
        .ctrl-btn:active {
            background: rgba(76, 175, 80, 0.4);
        }
        #up { grid-column: 2; grid-row: 1; }
        #left { grid-column: 1; grid-row: 2; }
        #right { grid-column: 3; grid-row: 2; }
        #down { grid-column: 2; grid-row: 3; }
    </style>
</head>
<body>

    <h1>經典貪食蛇 🐍</h1>
    
    <div class="top-bar">
        <div id="score">分數：0</div>
        <button class="game-over-btn" onclick="resetGame()">重新開始</button>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="pc-hint">提示：使用電腦鍵盤方向鍵控制</div>

    <div class="controller">
        <div id="up" class="ctrl-btn" ontouchstart="handleCtrl('Up')">⬆️</div>
        <div id="left" class="ctrl-btn" ontouchstart="handleCtrl('Left')">⬅️</div>
        <div id="right" class="ctrl-btn" ontouchstart="handleCtrl('Right')">➡️</div>
        <div id="down" class="ctrl-btn" ontouchstart="handleCtrl('Down')">⬇️</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake, food, dx, dy, score, gameInterval;

        function resetGame() {
            snake = [{x: 10, y: 10}];
            food = {x: 5, y: 5};
            dx = 0;
            dy = 0;
            score = 0;
            document.getElementById("score").innerText = "分數：" + score;
            
            clearInterval(gameInterval);
            gameInterval = setInterval(update, 120); // 稍微調慢一點點(120ms)，手機操作手感會更好
            generateFood();
        }

        function update() {
            if (dx === 0 && dy === 0) return;

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById("score").innerText = "分數：" + score;
                generateFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#4CAF50";
            snake.forEach(part => {
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });

            ctx.fillStyle = "#FF5722";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                }
            });
        }

        function gameOver() {
            clearInterval(gameInterval);
            alert("遊戲結束！你的分數是: " + score);
            resetGame(); // 彈出視窗點確認後自動重置，手感更好
        }

        function changeDirection(direction) {
            switch(direction) {
                case "Up":    if (dy === 0) { dx = 0; dy = -1; } break;
                case "Down":  if (dy === 0) { dx = 0; dy = 1; } break;
                case "Left":  if (dx === 0) { dx = -1; dy = 0; } break;
                case "Right": if (dx === 0) { dx = 1; dy = 0; } break;
            }
        }

        window.addEventListener("keydown", e => {
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) {
                e.preventDefault();
            }
            changeDirection(e.key.replace("Arrow", ""));
        });

        function handleCtrl(dir) {
            changeDirection(dir);
        }

        resetGame();
    </script>
</body>
</html>
