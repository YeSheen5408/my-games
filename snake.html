<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經典貪食蛇遊戲 🐍</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #222;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { margin-bottom: 10px; color: #4CAF50; }
        #score { font-size: 20px; margin-bottom: 20px; }
        canvas {
            background: #111;
            border: 4px solid #4CAF50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
        }
        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        .btn:hover { background: #45a049; }
    </style>
</head>
<body>

    <h1>經典貪食蛇 🐍</h1>
    <div id="score">分數：0</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <button class="btn" onclick="resetGame()">重新開始</button>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake, food, dx, dy, score, gameInterval;

        function resetGame() {
            snake = [{x: 10, y: 10}];
            food = {x: 5, y: 5};
            dx = 1;
            dy = 0;
            score = 0;
            document.getElementById("score").innerText = "分數：" + score;
            
            clearInterval(gameInterval);
            gameInterval = setInterval(update, 100);
            generateFood();
        }

        function update() {
            // 移動蛇頭
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // 撞牆判定
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // 撞到自己判定
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // 吃到食物判定
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById("score").innerText = "分數：" + score;
                generateFood();
            } else {
                snake.pop(); // 沒吃到食物就把尾巴縮減，維持長度
            }

            draw();
        }

        function draw() {
            // 清空畫布
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 畫蛇
            ctx.fillStyle = "#4CAF50";
            snake.forEach(part => {
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });

            // 畫食物
            ctx.fillStyle = "#FF5722";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            
            // 確保食物不會生在蛇身上
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                }
            });
        }

        function gameOver() {
            clearInterval(gameInterval);
            alert("遊戲結束！你的分數是: " + score);
        }

        // 監聽鍵盤事件（也支援手機滑動，這裡先做鍵盤版方便測試）
        window.addEventListener("keydown", e => {
            switch(e.key) {
                case "ArrowUp":    if (dy === 0) { dx = 0; dy = -1; } break;
                case "ArrowDown":  if (dy === 0) { dx = 0; dy = 1; } break;
                case "ArrowLeft":  if (dx === 0) { dx = -1; dy = 0; } break;
                case "ArrowRight": if (dx === 0) { dx = 1; dy = 0; } break;
            }
        });

        // 啟動遊戲
        resetGame();
    </script>
</body>
</html>
