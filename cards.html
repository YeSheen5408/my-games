<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記憶力大考驗翻牌遊戲</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { color: #333; margin-bottom: 10px; }
        .score-board { font-size: 18px; margin-bottom: 20px; color: #665; }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-gap: 10px;
        }
        .card {
            width: 80px;
            height: 80px;
            background-color: #2e7d32;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: transparent;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.3s, transform 0.1s;
        }
        .card:active { transform: scale(0.95); }
        .card.flipped {
            background-color: #ffffff;
            color: #000;
            cursor: default;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .card.matched {
            background-color: #e8f5e9;
            color: #81c784;
            cursor: default;
        }
        #restart-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #2196f3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #restart-btn:hover { background-color: #1e88e5; }
    </style>
</head>
<body>

    <h1>記憶力大考驗 🧠</h1>
    <div class="score-board">點擊次數：<span id="click-count">0</span></div>
    
    <div class="game-grid" id="grid"></div>
    
    <button id="restart-btn" onclick="initGame()">重新開始</button>

    <script>
        const emojis = ['🍎', '🍎', '🍌', '🍌', '🍓', '🍓', '🍇', '🍇', '🍒', '🍒', '🍉', '🍉', '🍍', '🍍', '🥝', '🥝'];
        let flippedCards = [];
        let matchedCount = 0;
        let clicks = 0;
        let canFlip = true;

        function initGame() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            flippedCards = [];
            matchedCount = 0;
            clicks = 0;
            canFlip = true;
            document.getElementById('click-count').innerText = clicks;

            // 洗牌演算法
            const shuffled = [...emojis].sort(() => Math.random() - 0.5);

            // 建立卡牌
            shuffled.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.emoji = emoji;
                card.dataset.id = index;
                card.innerText = emoji;
                card.addEventListener('click', flipCard);
                grid.appendChild(card);
            });
        }

        function flipCard() {
            if (!canFlip) return;
            if (this.classList.contains('flipped') || this.classList.contains('matched')) return;

            this.classList.add('flipped');
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                clicks++;
                document.getElementById('click-count').innerText = clicks;
                checkMatch();
            }
        }

        function checkMatch() {
            canFlip = false;
            const [card1, card2] = flippedCards;

            if (card1.dataset.emoji === card2.dataset.emoji) {
                // 配對成功
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedCount += 2;
                flippedCards = [];
                canFlip = true;

                if (matchedCount === emojis.length) {
                    setTimeout(() => alert(`恭喜通關！你總共點擊了 ${clicks} 次！`), 300);
                }
            } else {
                // 配對失敗，1秒後蓋回去
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    canFlip = true;
                }, 1000);
            }
        }

        // 頁面載入時初始化遊戲
        initGame();
    </script>
</body>
</html>
