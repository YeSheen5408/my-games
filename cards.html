<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>記憶力大考驗翻牌遊戲</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 { color: #333; margin: 0 0 5px 0; font-size: 24px; }
        .score-board { font-size: 16px; margin-bottom: 15px; color: #555; }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 10px;
            width: 90%;
            max-width: 360px;
        }
        .card {
            aspect-ratio: 1 / 1;
            background-color: #2e7d32; /* 蓋著時是綠色 */
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        /* 翻開與配對成功的樣式 */
        .card.flipped, .card.matched {
            background-color: #ffffff !important;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            cursor: default;
        }
        #restart-btn {
            margin-top: 25px;
            padding: 12px 24px;
            font-size: 16px;
            background-color: #2196f3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>記憶力大考驗 🧠</h1>
    <div class="score-board">點擊次數：<span id="click-count">0</span></div>
    
    <div class="game-grid" id="grid"></div>
    
    <button id="restart-btn" onclick="initGame()">重新開始</button>

    <script>
        const emojis = ['🍎', '🍎', '🍌', '🍌', '🍓', '🍓', '🍇', '🍇', '🍒', '🍒', '🍉', '🍉', '🍍', '🍍', '🥝', '🥝'];
        let flippedCards = [];
        let matchedCount = 0;
        let clicks = 0;
        let canFlip = true;

        function initGame() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            flippedCards = [];
            matchedCount = 0;
            clicks = 0;
            canFlip = true;
            document.getElementById('click-count').innerText = clicks;

            const shuffled = [...emojis].sort(() => Math.random() - 0.5);

            shuffled.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.emoji = emoji;
                // 初始狀態不塞任何文字內容，防 iOS Bug
                card.innerText = ''; 
                card.addEventListener('click', flipCard);
                grid.appendChild(card);
            });
        }

        function flipCard() {
            if (!canFlip) return;
            if (this.classList.contains('flipped') || this.classList.contains('matched')) return;

            // 翻開時，才把文字塞進去
            this.innerText = this.dataset.emoji;
            this.classList.add('flipped');
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                clicks++;
                document.getElementById('click-count').innerText = clicks;
                checkMatch();
            }
        }

        function checkMatch() {
            canFlip = false;
            const [card1, card2] = flippedCards;

            if (card1.dataset.emoji === card2.dataset.emoji) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedCount += 2;
                flippedCards = [];
                canFlip = true;

                if (matchedCount === emojis.length) {
                    setTimeout(() => alert(`恭喜通關！你總共點擊了 ${clicks} 次！`), 300);
                }
            } else {
                setTimeout(() => {
                    // 失敗蓋回去時，把文字拔掉
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    card1.innerText = '';
                    card2.innerText = '';
                    flippedCards = [];
                    canFlip = true;
                }, 1000);
            }
        }

        initGame();
    </script>
</body>
</html>
