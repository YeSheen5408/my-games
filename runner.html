<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>經典重現：火柴人橫向跑酷 🏃‍♂️</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0; background: #0a0b10; color: #fff;
            font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden;
            user-select: none;
        }
        .hud {
            width: 100%; max-width: 480px; display: flex; justify-content: space-between; padding: 8px 16px; font-size: 14px; font-weight: bold; font-family: monospace; background: rgba(255, 255, 255, 0.05); border-bottom: 1px solid #222;
        }
        canvas { background: #10121a; border: 2px solid #333; display: block; box-shadow: 0 0 20px rgba(0,255,204,0.1); }
        .instructions {
            width: 100%; max-width: 480px; text-align: center; padding: 10px; font-size: 12px; color: #aaa; background: #161925; border-top: 1px solid #333;
        }
        .btn-lobby { width: 90%; max-width: 480px; padding: 12px; background: #222; color: #fff; border: none; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="hud">
        <div>分數: <span style="color:#00ffcc;" id="score-text">0</span></div>
        <div>最高紀錄: <span style="color:#ffe600;" id="best-text">0</span></div>
    </div>

    <canvas id="runnerCanvas" width="480" height="270"></canvas>

    <div class="instructions">
        📱 點擊畫面上任意地方即可【跳躍】，空中再點一次可觸發【兩段跳】！
    </div>

    <button class="btn-lobby" onclick="if(window.parent && window.parent.closeGame){window.parent.closeGame()}else{location.href='index.html'}">🚪 收工回大廳</button>

    <script>
        const canvas = document.getElementById('runnerCanvas');
        const ctx = canvas.getContext('2d');

        // 讀取最高紀錄
        let bestScore = parseInt(localStorage.getItem('cyber_runner_best')) || 0;
        document.getElementById('best-text').innerText = bestScore;

        let score = 0;
        let gameSpeed = 3.5;
        let gameOver = false;
        const gravity = 0.45;

        // 🏃‍♂️ 跑酷主角玩家屬性
        let player = {
            x: 60, y: 180, w: 14, h: 26,
            vy: 0,
            isGrounded: false,
            jumpCount: 0, // 用於兩段跳判定
            rotation: 0 // 跳躍時的空中微翻轉特效
        };

        const groundY = 220; // 地平線高度
        let obstacles = [];
        let spawnTimer = 0;

        // 📱 點擊或觸控全螢幕跳躍偵測
        function handleJump(e) {
            e.preventDefault();
            if (gameOver) { restartGame(); return; }

            if (player.isGrounded) {
                player.vy = -7.5;
                player.isGrounded = false;
                player.jumpCount = 1;
            } else if (player.jumpCount === 1) { // 觸發核心兩段跳
                player.vy = -6.5;
                player.jumpCount = 2;
                player.rotation = 0.1; // 給予翻滾初始速度
            }
        }
        window.addEventListener('touchstart', handleJump, { passive: false });
        window.addEventListener('mousedown', handleJump);

        function restartGame() {
            score = 0; gameSpeed = 3.5; gameOver = false; obstacles = []; player.y = 180; player.vy = 0; player.jumpCount = 0; player.rotation = 0;
            document.getElementById('score-text').innerText = score;
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 🧱 1. 繪製霓虹背景裝飾（動態遠景線）
            ctx.strokeStyle = '#1d2133'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, groundY - 40); ctx.lineTo(canvas.width, groundY - 40); ctx.stroke();

            // 🛣️ 2. 繪製主地平線
            ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(canvas.width, groundY); ctx.stroke();

            if (!gameOver) {
                // 分數與速度隨時間微幅增長
                score++;
                if (score % 400 === 0) gameSpeed += 0.4; 
                document.getElementById('score-text').innerText = Math.floor(score / 5);

                // 3. 處理玩家重力與動態
                player.vy += gravity;
                player.y += player.vy;

                // 踩地判定
                if (player.y >= groundY - player.h) {
                    player.y = groundY - player.h;
                    player.vy = 0;
                    player.isGrounded = true;
                    player.jumpCount = 0;
                    player.rotation = 0;
                }

                // 4. 生成霓虹障礙物（隨機高度的高牆或雷射尖刺）
                spawnTimer++;
                if (spawnTimer > Math.max(45, 90 - gameSpeed * 5)) {
                    let type = Math.random() > 0.4 ? 'box' : 'spike';
                    let obsH = type === 'box' ? 20 + Math.random() * 20 : 25;
                    let obsW = type === 'box' ? 15 : 20;
                    obstacles.push({ x: canvas.width, y: groundY - obsH, w: obsW, h: obsH, type: type });
                    spawnTimer = 0;
                }

                // 5. 障礙物移動、繪製與精準碰撞檢測
                ctx.lineWidth = 2;
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    let o = obstacles[i];
                    o.x -= gameSpeed;

                    // 繪製不同類型的障礙物
                    if (o.type === 'box') {
                        ctx.fillStyle = '#ff0055'; ctx.strokeStyle = '#fff';
                        ctx.fillRect(o.x, o.y, o.w, o.h); ctx.strokeRect(o.x, o.y, o.w, o.h);
                    } else {
                        // 三角形霓虹雷射刺
                        ctx.fillStyle = '#ffaa00';
                        ctx.beginPath(); ctx.moveTo(o.x, o.y + o.h); ctx.lineTo(o.x + o.w/2, o.y); ctx.lineTo(o.x + o.w, o.y + o.h); ctx.fill();
                    }

                    // AABB 矩形碰撞盒判定
                    if (player.x < o.x + o.w && player.x + player.w > o.x &&
                        player.y < o.y + o.h && player.y + player.h > o.y) {
                        gameOver = true;
                        // 結算最高紀錄
                        let finalScore = Math.floor(score / 5);
                        if (finalScore > bestScore) {
                            bestScore = finalScore;
                            localStorage.setItem('cyber_runner_best', bestScore);
                            document.getElementById('best-text').innerText = bestScore;
                        }
                    }

                    if (o.x + o.w < 0) obstacles.splice(i, 1);
                }

                // 6. 繪製火柴人主角 (帶有空中兩段跳旋轉動畫)
                ctx.save();
                ctx.translate(player.x + player.w/2, player.y + player.h/2);
                if (!player.isGrounded && player.jumpCount === 2) {
                    player.rotation += 0.15; ctx.rotate(player.rotation);
                }
                
                // 畫火柴人的簡化賽博方塊身軀
                ctx.fillStyle = '#00ffcc';
                ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
                // 畫核心發光核心
                ctx.fillStyle = '#fff'; ctx.fillRect(-player.w/4, -player.h/3, player.w/2, player.h/4);
                ctx.restore();

            } else {
                // 💀 遊戲結束遮罩
                ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ff0055"; ctx.font = "bold 20px sans-serif"; ctx.textAlign = "center";
                ctx.fillText("CRASHED! 系統崩潰", canvas.width/2, canvas.height/2 - 10);
                ctx.fillStyle = "#fff"; ctx.font = "13px sans-serif";
                ctx.fillText("點擊畫面 重新啟動核心", canvas.width/2, canvas.height/2 + 20);
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
