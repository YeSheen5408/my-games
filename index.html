<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的小遊戲基地 🎮</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        p {
            color: #e0e0e0;
            margin-bottom: 40px;
        }
        .menu-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 600px;
        }
        .menu-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 25px;
            width: 200px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: transform 0.3s, background 0.3s;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.3);
        }
        .menu-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.2);
        }
        .game-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        .game-title {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .game-desc {
            font-size: 0.9rem;
            color: #ccc;
        }
    </style>
</head>
<body>

    <h1>🎮 我的小遊戲基地 🚀</h1>
    <p>歡迎光臨！請選擇你想挑戰的小遊戲：</p>

    <div class="menu-container">
        <a href="cards.html" class="menu-card">
            <div class="game-icon">🧠</div>
            <div class="game-title">記憶力大考驗</div>
            <div class="game-desc">翻開卡牌，考驗你的瞬間記憶力！</div>
        </a>

        <a href="snake.html" class="menu-card">
            <div class="game-icon">🐍</div>
            <div class="game-title">經典貪食蛇</div>
            <div class="game-desc">控制小蛇吃掉食物，挑戰最高分數！</div>
        </a>

        <a href="gacha.html" class="menu-card">
            <div class="game-icon">💎</div>
            <div class="game-title">冒險者抽卡</div>
            <div class="game-desc">測試你的脫非入歐運氣，挑戰集滿全圖鑑！</div>
        </a>

        <a href="mines.html" class="menu-card">
            <div class="game-icon">💣</div>
            <div class="game-title">經典踩地雷</div>
            <div class="game-desc">考驗邏輯與運氣，用智慧找出所有地雷！</div>
        </a>
    </div>

</body>
</html>
