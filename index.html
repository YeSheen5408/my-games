<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的小遊戲基地 🎮</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        p {
            color: #e0e0e0;
            margin-bottom: 25px;
        }

        /* 大廳分類與排序控制台 */
        .control-panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            padding: 8px 20px;
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-sort {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.4);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        .btn-sort:hover { background: rgba(255,255,255,0.1); }
        .btn-sort.active {
            background: #00ffcc;
            color: #1e3c72;
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0,255,204,0.4);
        }
        #sort-favorites.active {
            background: #ffe600;
            color: #000;
            border-color: #ffe600;
            box-shadow: 0 0 10px rgba(255,230,0,0.5);
        }

        .menu-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 950px;
            min-height: 200px;
        }
        .menu-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 25px;
            width: 200px;
            text-align: center;
            color: #fff;
            transition: transform 0.3s, background 0.3s;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.3);
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        .menu-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.2);
        }
        
        .star-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: transform 0.1s, color 0.2s;
            z-index: 10;
            padding: 4px;
        }
        .star-btn:hover { transform: scale(1.2); color: #ffe600; }
        .star-btn.favored {
            color: #ffe600;
            text-shadow: 0 0 8px rgba(255,230,0,0.6);
        }

        .menu-card.is-favored-marked {
            border: 1px solid rgba(255, 230, 0, 0.4);
            box-shadow: 0 4px 15px 0 rgba(255, 230, 0, 0.1);
        }

        .game-icon { font-size: 3rem; margin-bottom: 15px; }
        .game-title { font-size: 1.25rem; font-weight: bold; margin-bottom: 8px; }
        .game-desc { font-size: 0.9rem; color: #ccc; }

        .no-fav-msg {
            font-size: 14px;
            color: #ccc;
            text-align: center;
            margin-top: 40px;
            font-style: italic;
        }

        /* 全螢幕遊戲舞台容器 */
        .game-stage-container {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #121214;
            z-index: 9999;
        }
        .game-iframe { width: 100%; height: 100%; border: none; }

        /* 全域開發者懸浮重整球 */
        .dev-floater {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ffe600;
            border-radius: 30px;
            padding: 8px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            z-index: 100000; 
            box-shadow: 0 4px 20px rgba(255,230,0,0.4);
            font-family: monospace;
            flex-wrap: wrap;
        }
        .timer-highlight { color: #ffe600; font-weight: bold; }
        .count-highlight { color: #00ffcc; font-weight: bold; }
        
        /* 升級：自動重整開關按鈕樣式 */
        .btn-toggle-auto {
            background: #00ffcc; color: #111; border: none; border-radius: 15px;
            padding: 4px 12px; font-size: 11px; font-weight: bold; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-toggle-auto.disabled {
            background: #555; color: #aaa;
        }

        .btn-dev-refresh {
            background: #ff0055; color: white; border: none; border-radius: 15px;
            padding: 4px 10px; font-size: 11px; font-weight: bold; cursor: pointer;
        }
        .btn-dev-close {
            background: #444; color: white; border: none; border-radius: 15px;
            padding: 4px 10px; font-size: 11px; cursor: pointer; display: none; 
        }
    </style>
</head>
<body>

    <div class="dev-floater">
        <button class="btn-toggle-auto" id="autoToggleBtn" onclick="toggleAutoRefresh()">🟢 自動刷新: 開</button>
        <span>⏳ 剩餘: <span class="timer-highlight" id="devTimer">60</span>s</span>
        <span>🔄 已重整: <span class="count-highlight" id="refreshCount">0</span> 次</span>
        <button class="btn-dev-refresh" onclick="manualRefresh()">🔄 手動破快取</button>
        <button class="btn-dev-close" id="devCloseBtn" onclick="closeGame()">🚪 回大廳</button>
    </div>

    <h1>🎮 我的小遊戲基地 🚀</h1>
    <p>點擊卡牌右上角 ⭐ 標記，切換到「⭐ 我的最愛」分頁查看專屬常用清單！</p>

    <div class="control-panel">
        <button class="btn-sort" id="sort-classic" onclick="changeSort('classic')">📜 經典舊到新</button>
        <button class="btn-sort" id="sort-newest" onclick="changeSort('newest')">🆕 最新加到前</button>
        <button class="btn-sort" id="sort-random" onclick="changeSort('random')">🔀 天道隨機</button>
        <button class="btn-sort" id="sort-favorites" onclick="changeSort('favorites')">⭐ 我的最愛專區</button>
    </div>

    <div class="menu-container" id="menuContainer"></div>

    <div class="game-stage-container" id="gameStage">
        <iframe class="game-iframe" id="gameFrame" src=""></iframe>
    </div>

    <script>
        const originalGames = [
            { id: "cards", url: "cards.html", icon: "🧠", title: "記憶力大考驗", desc: "翻開卡牌，考驗你的瞬間記憶力！" },
            { id: "snake", url: "snake.html", icon: "🐍", title: "經典貪食蛇", desc: "控制小蛇吃掉食物，挑戰最高分數！" },
            { id: "gacha", url: "gacha.html", icon: "💎", title: "冒險者抽卡", desc: "測試你的脫非入歐運氣，挑戰集滿全圖鑑！" },
            { id: "mines", url: "mines.html", icon: "💣", title: "經典踩地雷", desc: "考驗邏輯與運氣，用智慧找出所有地雷！" },
            { id: "reversi", url: "reversi.html", icon: "🔮", title: "賽博黑白棋", desc: "圍夾翻轉！與極智 AI 展開棋盤上的黑白攻防大戰。" },
            { id: "dungeon", url: "dungeon.html", icon: "⚔️", title: "地下城隨機文字冒險", desc: "極簡純文字 RPG。目標挑戰第 10 層巨龍！" },
            { id: "cultivation", url: "cultivation.html", icon: "⚡", title: "賽博修仙：點擊與暴富", desc: "掛機點擊收集修為，股市等你一夕暴富！" },
            { id: "blackjack", url: "blackjack.html", icon: "🃏", title: "經典卡牌：21點對決", desc: "考驗膽識與算牌策略，與 AI 莊家展開驚心動魄的撲克對決！" },
            { id: "space", url: "space.html", icon: "🚀", title: "極簡彈幕：科幻星戰", desc: "雷射連發！體驗掌上流暢無阻的星際彈幕大戰。" },
            { id: "tower", url: "tower.html", icon: "🏹", title: "極簡策略：王國守衛戰", desc: "佈置箭塔、冰霜塔與火砲，抵禦一波波進犯的像素怪物群！" },
            { id: "mower", url: "mower.html", icon: "🔮", title: "爽快解壓：霓虹粒子割草", desc: "瘋狂吸取經驗值！體驗全螢幕環狀雷射橫飛的終極割草爽感。" },
            { id: "runner", url: "runner.html", icon: "🏃‍♂️", title: "極簡跑酷：賽博奔跑者", desc: "輕盈跳躍、空中兩段翻滾！挑戰極速霓虹障礙物與生涯最高分。" }
        ];

        let currentSort = localStorage.getItem('lobby_sort_mode') || 'classic';
        let favorites = JSON.parse(localStorage.getItem('lobby_favorites')) || [];

        // ⚙️ 新增：從快取記憶開關狀態（預設開啟 1，關閉為 0）
        let isAutoRefreshEnabled = localStorage.getItem('dev_auto_refresh') !== '0';

        let countdown = 60;
        let timerInterval = null;
        let currentUrl = "";
        let refreshCount = parseInt(sessionStorage.getItem('global_refresh_count')) || 0;

        function renderLobby() {
            const container = document.getElementById('menuContainer');
            container.innerHTML = '';
            let displayList = [];

            if (currentSort === 'favorites') {
                displayList = originalGames.filter(game => favorites.includes(game.id));
                if (displayList.length === 0) {
                    container.innerHTML = '<div class="no-fav-msg">目前還沒有收藏任何遊戲喔，快去一般分頁點擊星星標記吧！✨</div>';
                    updateButtonUI();
                    return;
                }
            } else {
                displayList = [...originalGames];
                if (currentSort === 'newest') {
                    displayList.reverse();
                } else if (currentSort === 'random') {
                    displayList.sort(() => Math.random() - 0.5);
                }
            }

            updateButtonUI();

            displayList.forEach(game => {
                const isFav = favorites.includes(game.id);
                const card = document.createElement('div');
                card.className = `menu-card ${isFav ? 'is-favored-marked' : ''}`;
                card.setAttribute('onclick', `openGame('${game.url}')`);
                card.innerHTML = `
                    <div class="star-btn ${isFav ? 'favored' : ''}" onclick="toggleFavorite(event, '${game.id}')">
                        ${isFav ? '★' : '☆'}
                    </div>
                    <div class="game-icon">${game.icon}</div>
                    <div class="game-title">${game.title}</div>
                    <div class="game-desc">${game.desc}</div>
                `;
                container.appendChild(card);
            });
        }

        function updateButtonUI() {
            document.querySelectorAll('.btn-sort').forEach(btn => btn.classList.remove('active'));
            if(document.getElementById(`sort-${currentSort}`)) {
                document.getElementById(`sort-${currentSort}`).classList.add('active');
            }
        }

        function toggleFavorite(event, gameId) {
            event.stopPropagation();
            if (favorites.includes(gameId)) {
                favorites = favorites.filter(id => id !== gameId);
            } else {
                favorites.push(gameId);
            }
            localStorage.setItem('lobby_favorites', JSON.stringify(favorites));
            renderLobby();
        }

        function changeSort(mode) {
            currentSort = mode;
            if (mode !== 'favorites') localStorage.setItem('lobby_sort_mode', mode);
            renderLobby();
        }

        // ⚙️ 新增：切換自動刷新開關
        function toggleAutoRefresh() {
            isAutoRefreshEnabled = !isAutoRefreshEnabled;
            localStorage.setItem('dev_auto_refresh', isAutoRefreshEnabled ? '1' : '0');
            updateToggleBtnUI();
            
            if (isAutoRefreshEnabled) {
                startTimer(); // 重新啟動計時器
            } else {
                document.getElementById('devTimer').innerText = "⏸️"; // 顯示暫停符號
            }
        }

        // ⚙️ 新增：更新開關按鈕的外觀
        function updateToggleBtnUI() {
            const btn = document.getElementById('autoToggleBtn');
            if (isAutoRefreshEnabled) {
                btn.innerText = "🟢 自動刷新: 開";
                btn.classList.remove('disabled');
            } else {
                btn.innerText = "🔴 自動刷新: 關";
                btn.classList.add('disabled');
            }
        }

        // 計時器模組（整合開關判斷）
        function updateCountUI() { document.getElementById('refreshCount').innerText = refreshCount; }
        
        function startTimer() {
            clearInterval(timerInterval);
            if (!isAutoRefreshEnabled) {
                document.getElementById('devTimer').innerText = "⏸️";
                return; // 如果關閉了，直接不執行計時遞減
            }
            countdown = 60; 
            document.getElementById('devTimer').innerText = countdown;
            
            timerInterval = setInterval(() => {
                if (!isAutoRefreshEnabled) {
                    clearInterval(timerInterval);
                    document.getElementById('devTimer').innerText = "⏸️";
                    return;
                }
                countdown--; 
                document.getElementById('devTimer').innerText = countdown; 
                if (countdown <= 0) autoRefreshGame(); 
            }, 1000);
        }

        function openGame(url) { currentUrl = url; const stage = document.getElementById('gameStage'); const iframe = document.getElementById('gameFrame'); const closeBtn = document.getElementById('devCloseBtn'); iframe.src = url + "?t=" + new Date().getTime(); stage.style.display = "block"; closeBtn.style.display = "inline-block"; startTimer(); }
        function autoRefreshGame() { if (!isAutoRefreshEnabled) return; refreshCount++; sessionStorage.setItem('global_refresh_count', refreshCount); updateCountUI(); const iframe = document.getElementById('gameFrame'); if (currentUrl && document.getElementById('gameStage').style.display === "block") { iframe.src = currentUrl + "?t=" + new Date().getTime(); } else { location.href = "index.html?t=" + new Date().getTime(); } countdown = 60; document.getElementById('devTimer').innerText = countdown; }
        function manualRefresh() { const iframe = document.getElementById('gameFrame'); if (currentUrl && document.getElementById('gameStage').style.display === "block") { iframe.src = currentUrl + "?t=" + new Date().getTime(); } else { location.href = "index.html?t=" + new Date().getTime(); } countdown = 60; document.getElementById('devTimer').innerText = isAutoRefreshEnabled ? countdown : "⏸️"; }
        function closeGame() { const stage = document.getElementById('gameStage'); const iframe = document.getElementById('gameFrame'); const closeBtn = document.getElementById('devCloseBtn'); iframe.src = ""; stage.style.display = "none"; closeBtn.style.display = "none"; currentUrl = ""; refreshCount = 0; sessionStorage.setItem('global_refresh_count', refreshCount); updateCountUI(); startTimer(); }

        // 初始化
        updateToggleBtnUI();
        updateCountUI(); 
        startTimer(); 
        renderLobby();
    </script>
</body>
</html>
