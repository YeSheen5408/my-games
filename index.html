<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的小遊戲基地 🎮</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        p {
            color: #e0e0e0;
            margin-bottom: 40px;
        }
        .menu-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 700px;
        }
        .menu-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 25px;
            width: 200px;
            text-align: center;
            color: #fff;
            transition: transform 0.3s, background 0.3s;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.3);
            cursor: pointer;
            user-select: none;
        }
        .menu-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.2);
        }
        .game-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        .game-title {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .game-desc {
            font-size: 0.9rem;
            color: #ccc;
        }

        /* 全螢幕遊戲舞台容器 */
        .game-stage-container {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #121214;
            z-index: 9999;
        }
        .game-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 右上角全域開發者懸浮重整球 */
        .dev-floater {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #ffe600;
            border-radius: 30px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            z-index: 100000; 
            box-shadow: 0 4px 15px rgba(255,230,0,0.3);
            font-family: monospace;
        }
        .timer-highlight {
            color: #ffe600;
            font-weight: bold;
        }
        .btn-dev-refresh {
            background: #ff0055;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-dev-refresh:hover { background: #ff3377; }
        .btn-dev-close {
            background: #555;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 4px 10px;
            font-size: 11px;
            cursor: pointer;
        }
        .btn-dev-close:hover { background: #777; }
    </style>
</head>
<body>

    <h1>🎮 我的小遊戲基地 🚀</h1>
    <p>歡迎光臨！請選擇你想挑戰的小遊戲：</p>

    <div class="menu-container">
        <div onclick="openGame('cards.html')" class="menu-card">
            <div class="game-icon">🧠</div>
            <div class="game-title">記憶力大考驗</div>
            <div class="game-desc">翻開卡牌，考驗你的瞬間記憶力！</div>
        </div>

        <div onclick="openGame('snake.html')" class="menu-card">
            <div class="game-icon">🐍</div>
            <div class="game-title">經典貪食蛇</div>
            <div class="game-desc">控制小蛇吃掉食物，挑戰最高分數！</div>
        </div>

        <div onclick="openGame('gacha.html')" class="menu-card">
            <div class="game-icon">💎</div>
            <div class="game-title">冒險者抽卡</div>
            <div class="game-desc">測試你的脫非入歐運氣，挑戰集滿全圖鑑！</div>
        </div>

        <div onclick="openGame('mines.html')" class="menu-card">
            <div class="game-icon">💣</div>
            <div class="game-title">經典踩地雷</div>
            <div class="game-desc">考驗邏輯與運氣，用智慧找出所有地雷！</div>
        </div>

        <div onclick="openGame('reversi.html')" class="menu-card">
            <div class="game-icon">🔮</div>
            <div class="game-title">賽博黑白棋</div>
            <div class="game-desc">圍夾翻轉！與極智 AI 展開棋盤上的黑白攻防大戰。</div>
        </div>

        <div onclick="openGame('dungeon.html')" class="menu-card">
            <div class="game-icon">⚔️</div>
            <div class="game-title">地下城隨機文字冒險</div>
            <div class="game-desc">極簡純文字 RPG。打怪、奪寶、走訪商店，目標挑戰第 10 層巨龍！</div>
        </div>

        <div onclick="openGame('cultivation.html')" class="menu-card">
            <div class="game-icon">⚡</div>
            <div class="game-title">賽博修仙：點擊與暴富</div>
            <div class="game-desc">掛機點擊收集修為，更有隨機翻倍或歸零的賽博股市等你一夕暴富！</div>
        </div>
    </div>

    <div class="game-stage-container" id="gameStage">
        <div class="dev-floater">
            <span>⏳ 快取刷新倒數: <span class="timer-highlight" id="devTimer">60</span>s</span>
            <button class="btn-dev-refresh" onclick="forceRefreshGame()">🔄 強制重整破快取</button>
            <button class="btn-dev-close" onclick="closeGame()">🚪 回大廳</button>
        </div>
        <iframe class="game-iframe" id="gameFrame" src=""></iframe>
    </div>

    <script>
        let countdown = 60;
        let timerInterval = null;
        let currentUrl = "";

        // 啟動 60 秒循環計時器
        function startTimer() {
            clearInterval(timerInterval);
            countdown = 60;
            document.getElementById('devTimer').innerText = countdown;

            timerInterval = setInterval(() => {
                countdown--;
                document.getElementById('devTimer').innerText = countdown;
                
                if (countdown <= 0) {
                    forceRefreshGame();
                }
            }, 1000);
        }

        // 1. 打開遊戲舞台
        function openGame(url) {
            currentUrl = url;
            const stage = document.getElementById('gameStage');
            const iframe = document.getElementById('gameFrame');
            
            // 首次加載加上時間戳防快取
            iframe.src = url + "?t=" + new Date().getTime();
            stage.style.display = "block";
            
            startTimer(); 
        }

        // 2. 強制重整小遊戲
        function forceRefreshGame() {
            const iframe = document.getElementById('gameFrame');
            if (currentUrl) {
                iframe.src = currentUrl + "?t=" + new Date().getTime();
                countdown = 60; 
                document.getElementById('devTimer').innerText = countdown;
                console.log(`[Dev Tool] 已對 ${currentUrl} 執行去快取重整`);
            }
        }

        // 3. 關閉遊戲舞台回大廳（此處已修正語法錯誤）
        function closeGame() {
            clearInterval(timerInterval);
            const stage = document.getElementById('gameStage');
            const iframe = document.getElementById('gameFrame');
            
            iframe.src = ""; 
            stage.style.display = "none";
        }
    </script>

</body>
</html>
